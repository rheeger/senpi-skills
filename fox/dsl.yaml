# ── EXIT (DSL) — FOX v2.0 ──
# Source: fox/scripts/fox-scanner.py build_dsl_state_template()
# Plugin runtime: senpi-trading-runtime/src/dsl/
#
# FOX v2.0 — Dual-Mode Emerging Movers (Stalker + Striker)
# Scanner tweak: Stalker minReasons=3 (requires breadth of confirmation).
# DSL config is identical across ORCA, FOX, MANTIS, ROACH.
# Differences are in entry/scanner logic only.

exit:
  engine: dsl
  interval_seconds: 30
  dsl_presets:
    default:
      # max_loss_pct = absolute floor as ROE %
      # Python: absoluteFloorRoe: -18 (score>=6 conviction tier, tightest)
      max_loss_pct: 18
      phase1:
        enabled: true
        retrace_threshold: 3                    # Python: retraceThreshold 0.03 → 3% ROE
        consecutive_breaches_required: 3         # NOT 1 — Fox's #1 bug fix
        hard_timeout:
          enabled: true
          interval_in_minutes: 25                # score>=6 conviction tier
        weak_peak_cut:
          enabled: true
          interval_in_minutes: 12                # score>=6 conviction tier
          min_value: 3.0                         # ROE % — peak must exceed this
        dead_weight_cut:
          enabled: true
          interval_in_minutes: 8                 # score>=6 conviction tier
      phase2_trigger_tier: 0                     # Phase 2 starts at first tier (7% ROE)
      phase2:
        enabled: true
        retrace_threshold: 1.5                   # Python: retraceThreshold 0.015 → 1.5% ROE
        consecutive_breaches_required: 2
        tiers:
          - { trigger_pct: 7,  lock_hw_pct: 40, breaches: 3 }
          - { trigger_pct: 12, lock_hw_pct: 55, breaches: 2 }
          - { trigger_pct: 15, lock_hw_pct: 75, breaches: 2 }
          - { trigger_pct: 20, lock_hw_pct: 85, breaches: 1 }

# ── NOT YET SUPPORTED BY PLUGIN ──
# The following Python DSL features are not yet supported by the plugin runtime.
# They are documented here for future implementation.
#
# stagnation_tp:                              # MANDATORY — Mantis removed it and underperformed
#   enabled: true
#   roe_min: 10                               # Min ROE % to activate stagnation check
#   hw_stale_min: 45                          # Minutes HW must be stale before TP
#
# conviction_tiers (score-based Phase 1 scaling — not yet supported):
# The "default" preset above uses score>=6 (tightest). In Python, the scanner
# dynamically selects Phase 1 timeouts based on entry signal score:
#   - { min_score: 6,  absolute_floor_roe: -18, hard_timeout_min: 25, weak_peak_cut_min: 12, dead_weight_cut_min: 8 }
#   - { min_score: 8,  absolute_floor_roe: -25, hard_timeout_min: 45, weak_peak_cut_min: 20, dead_weight_cut_min: 15 }
#   - { min_score: 10, absolute_floor_roe: -30, hard_timeout_min: 60, weak_peak_cut_min: 30, dead_weight_cut_min: 20 }
#
# lock_mode: pct_of_high_water               # Only mode; hardcoded in plugin
# phase2_trigger_roe: 7                      # Plugin uses phase2_trigger_tier index instead
