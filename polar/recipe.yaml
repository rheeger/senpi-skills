name: polar-tracker
version: 1.0.0
description: >
  Onchain position tracker — monitors strategy wallet on Hyperliquid
  for position lifecycle events and wires them into the DSL exit engine.
  ETH alpha hunter with position lifecycle.

# ── STRATEGY ──
strategy:
  wallet: "${WALLET_ADDRESS}"
  enabled: true

# ── SCANNERS ──
scanners:
  - name: position_tracker
    type: position_tracker
    interval: 10s

# ── ACTIONS ──
actions:
  - name: position_tracker_action
    action_type: POSITION_TRACKER
    decision_mode: rule
    scanners: [position_tracker]

# ── EXIT (DSL) ──
exit:
  engine: dsl
  interval_seconds: 30
  dsl_preset:
    phase1:
      enabled: true
      max_loss_pct: 35.0
      retrace_threshold: 12
      consecutive_breaches_required: 3
    phase2:
      enabled: true
      tiers:
        - { trigger_pct: 5, lock_hw_pct: 20 }
        - { trigger_pct: 10, lock_hw_pct: 35 }
        - { trigger_pct: 20, lock_hw_pct: 55 }
        - { trigger_pct: 30, lock_hw_pct: 70 }
        - { trigger_pct: 50, lock_hw_pct: 85 }

# ── NOTIFICATIONS ──
notifications:
  telegram_chat_id: "${TELEGRAM_CHAT_ID}"
