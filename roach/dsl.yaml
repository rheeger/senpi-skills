# ── EXIT (DSL) — ROACH v1.0 ──
# Source: roach/scripts/roach-scanner.py
# Plugin runtime: senpi-trading-runtime/src/dsl/
#
# ROACH v1.0 — Striker-Only Scanner (Stalker disabled)
# Only trades STRIKER signals (first jumps backed by 1.5x volume explosions).
# Typical entry scores are 9+ → in practice uses score>=8 conviction tier.
# DSL config is identical across ORCA, FOX, MANTIS, ROACH.
# Differences are in entry/scanner logic only.
# Default values use score >= 6 conviction tier (tightest).

exit:
  engine: dsl
  interval_seconds: 30
  dsl_preset:
    hard_timeout:
      enabled: true
      interval_in_minutes: 360
    weak_peak_cut:
      enabled: true
      interval_in_minutes: 120
      min_value: 5
    dead_weight_cut:
      enabled: true
      interval_in_minutes: 60
    phase1:
      enabled: true
      max_loss_pct: 4.0
      retrace_threshold: 7
      consecutive_breaches_required: 1
    phase2:
      enabled: true
      tiers:
        - { trigger_pct: 7,  lock_hw_pct: 40 }
        - { trigger_pct: 12, lock_hw_pct: 55 }
        - { trigger_pct: 15, lock_hw_pct: 75 }
        - { trigger_pct: 20, lock_hw_pct: 85 }

# ── NOT YET SUPPORTED BY PLUGIN ──
# The following Python DSL features are not yet supported by the plugin runtime.
# They are documented here for future implementation.
#
# stagnation_tp:                              # MANDATORY — Mantis removed it and underperformed
#   enabled: true
#   roe_min: 10                               # Min ROE % to activate stagnation check
#   hw_stale_min: 45                          # Minutes HW must be stale before TP
#
# conviction_tiers (score-based Phase 1 scaling — not yet supported):
# The preset above uses score>=6 (tightest). In Python, the scanner
# dynamically selects Phase 1 timeouts based on entry signal score:
#   - { min_score: 6,  absolute_floor_roe: -18, hard_timeout_min: 25, weak_peak_cut_min: 12, dead_weight_cut_min: 8 }
#   - { min_score: 8,  absolute_floor_roe: -25, hard_timeout_min: 45, weak_peak_cut_min: 20, dead_weight_cut_min: 15 }
#   - { min_score: 10, absolute_floor_roe: -30, hard_timeout_min: 60, weak_peak_cut_min: 30, dead_weight_cut_min: 20 }
#
# ROACH-SPECIFIC NOTE:
# Since ROACH only uses Striker signals (score 9+), entries typically match the
# score>=8 conviction tier in Python (hard_timeout=45m, weak_peak=20m, dead_weight=15m).
# When conviction_tiers are supported, ROACH would benefit from wider timeouts.
