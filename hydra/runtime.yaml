name: hydra-tracker
version: 1.0.0
description: >
  Squeeze detector — finds crowded trades about to unwind.
  Funding extreme + SM against crowd + price starting to move.
  Squeezes cascade over hours. Wide timeouts, no time-based cuts.

# ── STRATEGY ──
strategy:
  wallet: "${WALLET_ADDRESS}"
  budget: 1000
  slots: 2
  margin_per_slot: 180
  enabled: true

# ── SCANNERS ──
scanners:
  - name: position_tracker
    type: position_tracker
    interval: 10s

# ── ACTIONS ──
actions:
  - name: position_tracker_action
    action_type: POSITION_TRACKER
    decision_mode: rule
    scanners: [position_tracker]

# ── EXIT (DSL) ──
# Squeezes cascade over hours as liquidations chain together.
# No time-based cuts — let the cascade play out.
# Phase 2 starts locking early (5%) because squeezes can reverse violently.
exit:
  engine: dsl
  interval_seconds: 30
  dsl_preset:
    hard_timeout:
      enabled: true
      interval_in_minutes: 180
    weak_peak_cut:
      enabled: false
    dead_weight_cut:
      enabled: false
    phase1:
      enabled: true
      max_loss_pct: 20.0
      retrace_threshold: 8
      consecutive_breaches_required: 3
    phase2:
      enabled: true
      tiers:
        - { trigger_pct: 5,  lock_hw_pct: 25 }
        - { trigger_pct: 10, lock_hw_pct: 45 }
        - { trigger_pct: 15, lock_hw_pct: 60 }
        - { trigger_pct: 20, lock_hw_pct: 75 }
        - { trigger_pct: 30, lock_hw_pct: 85 }
        - { trigger_pct: 50, lock_hw_pct: 90 }

# ── NOTIFICATIONS ──
notifications:
  telegram_chat_id: "${TELEGRAM_CHAT_ID}"
